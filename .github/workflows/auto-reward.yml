name: MZZ Auto Reward System

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  execute:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          npm install web3 node-fetch@2
      
      - name: Run auto reward system
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          TOKEN_ADDRESS: ${{ secrets.TOKEN_ADDRESS }}
          TWITTER_ACCOUNT: ${{ secrets.TWITTER_ACCOUNT }}
        run: |
          node scripts/auto-reward.js
      
      - name: Upload data.json as artifact
        uses: actions/upload-artifact@v3
        with:
          name: reward-data
          path: docs/data.json
