name: MZZ Auto Reward System

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  execute:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: |
          npm install web3 node-fetch@2
      
      - name: Run auto reward system
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          TOKEN_ADDRESS: ${{ secrets.TOKEN_ADDRESS }}
          TWITTER_ACCOUNT: ${{ secrets.TWITTER_ACCOUNT }}
        run: |
          node scripts/auto-reward.js
      
      - name: Commit and push data
        run: |
          git config --global user.name "WXF1987"
          git config --global user.email "434505492@qq.com"
          git add docs/data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Auto update reward data $(date)"
          git push https://WXF1987:${{ secrets.GITHUB_TOKEN }}@github.com/WXF1987/mzz-auto-reward.git
