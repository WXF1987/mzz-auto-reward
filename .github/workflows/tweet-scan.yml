name: 推文检测抽奖

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  scan-and-draw:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: 设置 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: 安装依赖
        run: npm install web3 node-fetch@2
      - name: 执行推文检测抽奖
        env:
          CONTRACT_ADDRESS: ${{ secrets.CONTRACT_ADDRESS }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: node scripts/tweet-scanner.js
      - name: 提交数据更新
        run: |
          git config --global user.name "MZZ Bot"
          git config --global user.email "bot@mzz.game"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 自动更新"
          git push
