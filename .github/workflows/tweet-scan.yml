name: 推文自动检测

on:
  schedule:
    - cron: '*/15 * * * *'  # 每15分钟运行
  workflow_dispatch:        # 手动触发

jobs:
  scan-tweets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: 设置 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: 安装依赖
        run: |
          npm install web3 node-fetch@2
      
      - name: 执行推文检测
        env:
          CONTRACT_ADDRESS: ${{ secrets.CONTRACT_ADDRESS }}
        run: node scripts/tweet-scanner.js
      
      - name: 提交检测结果
        run: |
          git config --global user.name "MZZ Scanner"
          git config --global user.email "scan@mzz.game"
          git add data/candidates.json data/winners.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 推文检测更新 $(date +'%Y-%m-%d %H:%M')"
          git push
