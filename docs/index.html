<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZZ摸珠子游戏实时监控 - 全自动推文抽奖系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
    <style>
        /* 样式保持不变 - 使用之前的完整样式 */
        :root {
            --primary: #4a6fa5;
            --secondary: #166088;
            --accent: #ff6b6b;
            --success: #4caf50;
            --warning: #ff9800;
            --info: #2196f3;
            --purple: #9c27b0;
            --twitter: #1da1f2;
            --bg-light: #f8f9fa;
            --bg-dark: #343a40;
            --text-light: #ffffff;
            --text-dark: #212529;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            color: var(--text-light);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        header h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        header h1 i {
            color: var(--accent);
        }
        
        header p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card i {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 15px;
        }
        
        .stat-card h3 {
            font-size: 1.1rem;
            color: var(--secondary);
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--accent);
            margin: 10px 0;
        }
        
        .section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        
        .section-title {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--primary);
        }
        
        .section-title i {
            font-size: 1.8rem;
            color: var(--primary);
        }
        
        .section-title h2 {
            font-size: 1.8rem;
            color: var(--secondary);
        }
        
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 15px 30px;
            background: none;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            flex: 1;
            min-width: 150px;
            text-align: center;
        }
        
        .tab i {
            margin-right: 8px;
        }
        
        .tab.active {
            color: var(--primary);
        }
        
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .data-table th {
            background: var(--primary);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        
        .data-table td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .data-table tr:hover {
            background: #f5f5f5;
        }
        
        .address-cell {
            font-family: monospace;
            font-size: 0.9rem;
            color: var(--secondary);
        }
        
        .amount-cell {
            color: var(--success);
            font-weight: 700;
        }
        
        .twitter-cell {
            color: var(--twitter);
            font-weight: 600;
        }
        
        .time-cell {
            color: #666;
            font-size: 0.9rem;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
        }
        
        .status-success {
            background: var(--success);
        }
        
        .status-pending {
            background: var(--warning);
        }
        
        .status-active {
            background: var(--info);
        }
        
        .tweet-content {
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #333;
        }
        
        .load-more {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
        }
        
        .load-more-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .load-more-btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state i {
            font-size: 3rem;
            color: #ddd;
            margin-bottom: 20px;
        }
        
        .last-updated {
            text-align: right;
            color: #666;
            font-size: 0.9rem;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #e0e0e0;
        }
        
        .refresh-controls {
            text-align: center;
            margin: 20px 0;
        }
        
        .refresh-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }
        
        .refresh-btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }
        
        .refresh-btn i {
            transition: transform 0.5s ease;
        }
        
        .refresh-btn:hover i {
            transform: rotate(180deg);
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .tabs {
                flex-direction: column;
            }
            
            .tab {
                min-width: 100%;
            }
            
            header h1 {
                font-size: 2rem;
            }
            
            .section {
                padding: 20px;
            }
            
            .data-table {
                display: block;
                overflow-x: auto;
            }
            
            .tweet-content {
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-gem"></i> MZZ摸珠子游戏实时监控</h1>
            <p>基于区块链的透明公平游戏平台 | 全自动推文抽奖系统 | 实时链上数据</p>
        </header>

        <!-- 主要统计卡片 - 实时数据 -->
        <div class="stats-grid" id="statsGrid">
            <!-- 动态加载 -->
        </div>

        <!-- 税费配置和资金池 -->
        <div class="section">
            <div class="section-title">
                <i class="fas fa-chart-pie"></i>
                <h2>税费分配与资金池</h2>
            </div>
            <div id="poolSection">
                <!-- 动态加载 -->
            </div>
        </div>

        <!-- 推文监控分类（新增） -->
        <div class="section">
            <div class="section-title">
                <i class="fab fa-twitter" style="color: #1da1f2;"></i>
                <h2>推文抽奖监控</h2>
                <span class="status-badge status-active" id="twitterStatus">
                    <i class="fas fa-sync-alt fa-spin"></i> 自动扫描中
                </span>
            </div>
            
            <div class="stats-grid" id="twitterStats">
                <!-- 动态加载 -->
            </div>
            
            <div class="tabs">
                <button class="tab active" data-tab="tweet-candidates">
                    <i class="fas fa-users"></i> 候选者列表
                </button>
                <button class="tab" data-tab="tweet-winners">
                    <i class="fas fa-trophy"></i> 获奖记录
                </button>
                <button class="tab" data-tab="tweet-history">
                    <i class="fas fa-history"></i> 所有推文
                </button>
            </div>
            
            <div id="tweet-candidates" class="tab-content active">
                <h3><i class="fas fa-clock"></i> 当前小时候选者（推文≥1小时）</h3>
                <div id="candidatesTable">
                    <!-- 动态加载 -->
                </div>
            </div>
            
            <div id="tweet-winners" class="tab-content">
                <h3><i class="fas fa-gift"></i> 推文抽奖获奖记录</h3>
                <div id="tweetWinnersTable">
                    <!-- 动态加载 -->
                </div>
            </div>
            
            <div id="tweet-history" class="tab-content">
                <h3><i class="fas fa-search"></i> 所有已扫描推文</h3>
                <div id="allTweetsTable">
                    <!-- 动态加载 -->
                </div>
            </div>
        </div>

        <!-- 摸珠子游戏记录 -->
        <div class="section">
            <div class="section-title">
                <i class="fas fa-dice"></i>
                <h2>摸珠子游戏记录</h2>
            </div>
            
            <div class="tabs">
                <button class="tab active" data-tab="buy-lottery">
                    <i class="fas fa-shopping-cart"></i> 买入抽奖
                </button>
                <button class="tab" data-tab="hourly-lottery">
                    <i class="fas fa-clock"></i> 小时抽奖
                </button>
                <button class="tab" data-tab="compensation">
                    <i class="fas fa-gem"></i> 钻石手补偿
                </button>
                <button class="tab" data-tab="buyback">
                    <i class="fas fa-fire"></i> 回购销毁
                </button>
            </div>
            
            <div id="buy-lottery" class="tab-content active">
                <div id="buyLotteryTable"></div>
            </div>
            <div id="hourly-lottery" class="tab-content">
                <div id="hourlyLotteryTable"></div>
            </div>
            <div id="compensation" class="tab-content">
                <div id="compensationTable"></div>
            </div>
            <div id="buyback" class="tab-content">
                <div id="buybackTable"></div>
            </div>
        </div>

        <!-- 刷新控制 -->
        <div class="refresh-controls">
            <button class="refresh-btn" id="refreshBtn">
                <i class="fas fa-sync-alt"></i> 立即刷新数据
            </button>
            <div class="last-updated" id="lastUpdated">
                最后更新: <span id="updateTime">--:--:--</span>
                | 数据源: <span id="dataSource">GitHub Actions</span>
            </div>
        </div>
    </div>

    <script>
        // ========== 全局变量 ==========
        const DATA_URL = 'https://wxf1987.github.io/mzz-auto-reward/data.json';
        let web3;
        let refreshInterval;
        let currentData = null;

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', function() {
            initWeb3();
            initTabs();
            loadData();
            startAutoRefresh();
            
            document.getElementById('refreshBtn').addEventListener('click', function() {
                const btn = this;
                btn.querySelector('i').classList.add('fa-spin');
                loadData().finally(() => {
                    setTimeout(() => btn.querySelector('i').classList.remove('fa-spin'), 500);
                });
            });
        });

        // ========== 初始化Web3 ==========
        function initWeb3() {
            try {
                web3 = new Web3(new Web3.providers.HttpProvider('https://bsc-dataseed.binance.org/'));
            } catch (error) {
                console.error('Web3初始化失败:', error);
            }
        }

        // ========== 初始化选项卡 ==========
        function initTabs() {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    const parent = this.closest('.section');
                    parent.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    parent.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    
                    this.classList.add('active');
                    const tabId = this.getAttribute('data-tab');
                    parent.querySelector('#' + tabId).classList.add('active');
                });
            });
        }

        // ========== 加载真实数据 ==========
        async function loadData() {
            try {
                // 从GitHub Pages加载真实的data.json
                const response = await fetch(DATA_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('数据加载失败');
                
                const data = await response.json();
                currentData = data;
                
                // 更新所有UI组件
                updateStats(data);
                updatePoolSection(data);
                updateTwitterSection(data);
                updateGameRecords(data);
                updateLastUpdated();
                
                console.log('数据加载成功:', new Date().toLocaleString());
                
            } catch (error) {
                console.error('加载真实数据失败:', error);
                document.getElementById('dataSource').innerHTML = '使用演示数据';
                
                // 使用演示数据（避免页面空白）
                useDemoData();
            }
        }

        // ========== 更新统计卡片 ==========
        function updateStats(data) {
            const totalRewards = data.winners?.reduce((sum, w) => sum + (w.amount || 0), 0) || 0;
            const totalWinners = new Set(data.winners?.map(w => w.wallet)).size || 0;
            const today = new Date().toISOString().split('T')[0];
            const todayWinners = data.winners?.filter(w => w.time?.startsWith(today)) || [];
            const todayTotal = todayWinners.reduce((sum, w) => sum + (w.amount || 0), 0);
            const totalCandidates = data.candidates?.length || 0;
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <i class="fas fa-coins"></i>
                    <h3>总发放奖励</h3>
                    <div class="value">$${formatNumber(totalRewards)}</div>
                    <div>已发放 ${data.winners?.length || 0} 次</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-users"></i>
                    <h3>总获奖人数</h3>
                    <div class="value">${totalWinners}</div>
                    <div>独立钱包地址</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-calendar-day"></i>
                    <h3>今日发放</h3>
                    <div class="value">$${formatNumber(todayTotal)}</div>
                    <div>今日获奖 ${todayWinners.length} 人</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-twitter" style="color: #1da1f2;"></i>
                    <h3>推文候选者</h3>
                    <div class="value">${totalCandidates}</div>
                    <div>等待抽奖中</div>
                </div>
            `;
        }

        // ========== 更新资金池 ==========
        function updatePoolSection(data) {
            const contractStats = data.contractStats || {};
            
            document.getElementById('poolSection').innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <i class="fas fa-chart-line"></i>
                        <h3>营销池</h3>
                        <div class="value">20%</div>
                        <div>项目运营推广</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-dice"></i>
                        <h3>摸珠子池</h3>
                        <div class="value">20%</div>
                        <div>买入即时抽奖</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-fire"></i>
                        <h3>回购池</h3>
                        <div class="value">20%</div>
                        <div>通缩销毁机制</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-gem"></i>
                        <h3>补偿池</h3>
                        <div class="value">20%</div>
                        <div>钻石手保护</div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-clock"></i>
                        <h3>小时抽奖池</h3>
                        <div class="value">20%</div>
                        <div>定期奖励池</div>
                    </div>
                </div>
                <div style="margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span><i class="fas fa-chart-simple"></i> 总税收分配</span>
                        <span style="font-weight: 700; color: var(--accent);">100% 公平分配</span>
                    </div>
                    <div style="margin-top: 10px; color: #666;">
                        合约总发放: $${formatNumber(contractStats.totalRewards || 0)} | 
                        总获奖人数: ${contractStats.totalWinners || 0}
                    </div>
                </div>
            `;
        }

        // ========== 更新推文监控部分（真实数据）==========
        function updateTwitterSection(data) {
            const candidates = data.candidates || [];
            const winners = data.winners || [];
            const processedTweets = data.processedTweets || [];
            
            // 过滤出推文获奖记录
            const tweetWinners = winners.filter(w => w.tweetId && !w.tweetId.startsWith('mock'));
            
            // 获取所有推文记录
            const allTweets = candidates.map(c => ({
                id: c.tweetId,
                wallet: c.wallet,
                time: c.time,
                platform: c.platform || 'Twitter',
                status: c.eligible ? '待抽奖' : '已处理',
                content: c.tweetContent || `摸珠子游戏合约地址推文`
            }));
            
            // 更新推文统计
            const eligibleCandidates = candidates.filter(c => {
                const tweetTime = new Date(c.time);
                const now = new Date();
                return (now - tweetTime) / 3600000 >= 1 && c.eligible;
            }).length;
            
            document.getElementById('twitterStats').innerHTML = `
                <div class="stat-card">
                    <i class="fas fa-users"></i>
                    <h3>总候选者</h3>
                    <div class="value">${candidates.length}</div>
                    <div>累计提交推文</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-hourglass-half"></i>
                    <h3>符合条件</h3>
                    <div class="value">${eligibleCandidates}</div>
                    <div>推文≥1小时</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-trophy"></i>
                    <h3>已获奖</h3>
                    <div class="value">${tweetWinners.length}</div>
                    <div>推文抽奖中奖</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-search"></i>
                    <h3>已扫描</h3>
                    <div class="value">${processedTweets.length}</div>
                    <div>总处理推文</div>
                </div>
            `;
            
            // 更新候选者列表
            updateCandidatesTable(candidates);
            
            // 更新推文获奖记录
            updateTweetWinnersTable(tweetWinners);
            
            // 更新所有推文列表
            updateAllTweetsTable(allTweets);
            
            // 更新推特状态
            document.getElementById('twitterStatus').innerHTML = `
                <i class="fas fa-check-circle"></i> 自动扫描中 | 每小时执行
            `;
        }

        // ========== 更新候选者表格 ==========
        function updateCandidatesTable(candidates) {
            const eligible = candidates.filter(c => {
                const tweetTime = new Date(c.time);
                const now = new Date();
                return (now - tweetTime) / 3600000 >= 1 && c.eligible;
            }).sort((a, b) => new Date(b.time) - new Date(a.time));
            
            if (eligible.length === 0) {
                document.getElementById('candidatesTable').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-users"></i>
                        <h3>暂无候选者</h3>
                        <p>等待用户发布符合规则的推文</p>
                    </div>
                `;
                return;
            }
            
            let html = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>钱包地址</th>
                            <th>推文ID</th>
                            <th>发布时间</th>
                            <th>平台</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            eligible.slice(0, 10).forEach(c => {
                html += `
                    <tr>
                        <td class="address-cell">${shortenAddress(c.wallet)}</td>
                        <td><span class="twitter-cell"><i class="fab fa-twitter"></i> ${c.tweetId.substring(0, 12)}...</span></td>
                        <td class="time-cell">${formatTime(c.time)}</td>
                        <td>${c.platform || 'Twitter'}</td>
                        <td><span class="status-badge status-pending">待抽奖</span></td>
                    </tr>
                `;
            });
            
            html += `
                    </tbody>
                </table>
                <div class="load-more">
                    <button class="load-more-btn" onclick="loadMoreCandidates()">加载更多</button>
                </div>
            `;
            
            document.getElementById('candidatesTable').innerHTML = html;
        }

        // ========== 更新推文获奖表格 ==========
        function updateTweetWinnersTable(winners) {
            if (winners.length === 0) {
                document.getElementById('tweetWinnersTable').innerHTML = `

        // ========== 工具函数 ==========
        function shortenAddress(address) {
            if (!address) return 'N/A';
            if (address.length < 15) return address;
            return address.substring(0, 8) + '...' + address.substring(address.length - 6);
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(2) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toFixed(2);
        }

        function formatTime(isoString) {
            if (!isoString) return 'N/A';
            const date = new Date(isoString);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            return Math.floor(diff / 86400000) + '天前';
        }

        function formatDateTime(isoString) {
            if (!isoString) return 'N/A';
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN', { hour12: false });
        }

        function updateLastUpdated() {
            const now = new Date();
            document.getElementById('updateTime').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('dataSource').innerHTML = 'GitHub Actions 实时数据';
        }
